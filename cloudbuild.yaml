steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/get200-web-repo/frontend:$SHORT_SHA
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/get200-web-repo/frontend:latest
      - .

  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - asia-south1-docker.pkg.dev/$PROJECT_ID/get200-web-repo/frontend:$SHORT_SHA

  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - asia-south1-docker.pkg.dev/$PROJECT_ID/get200-web-repo/frontend:latest

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - get200-web
      - --image=asia-south1-docker.pkg.dev/$PROJECT_ID/get200-web-repo/frontend:$SHORT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated

options:
  logging: CLOUD_LOGGING_ONLY
