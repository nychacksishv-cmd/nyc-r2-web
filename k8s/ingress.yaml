apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: get200-ingress
  namespace: get200
  annotations:
    kubernetes.io/ingress.global-static-ip-name: "get200-ip"
    networking.gke.io/managed-certificates: "frontend-cert,api-cert" # References both certificates
    kubernetes.io/ingress.class: "gce"
spec:
  rules:
    - host: get200.qd.je # Frontend routing
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80
    - host: api.get200.qd.je # Backend API routing
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 80
---
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: frontend-cert
  namespace: get200
spec:
  domains:
    - get200.qd.je
---
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: api-cert
  namespace: get200
spec:
  domains:
    - api.get200.qd.je
